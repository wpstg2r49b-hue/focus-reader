<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Focus Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@300;400&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0b09; --surface:#111009; --border:#242018;
  --gold:#c8a96e; --gold-dim:#6b5a38; --gold-faint:#1e1a12;
  --text:#e2d9c5; --text-mid:#8a7d65; --text-dim:#3d3829;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Lora',serif;height:100vh;overflow:hidden;user-select:none}
#app{position:relative;width:100%;height:100vh;display:flex;align-items:center;justify-content:center}
#prog{position:absolute;top:0;left:0;height:1px;width:0%;background:var(--gold);transition:width .5s ease;z-index:20}
#scan{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.03) 3px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:1}
.btn{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;color:var(--text-mid);background:none;border:1px solid var(--border);padding:5px 10px;cursor:pointer;text-transform:uppercase;transition:color .15s,border-color .15s,background .15s;white-space:nowrap}
.btn:hover{color:var(--gold);border-color:var(--gold-dim)}
.btn.active{color:var(--gold);border-color:var(--gold-dim);background:var(--gold-faint)}

/* ── Drop screen ── */
#drop-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:var(--bg);z-index:50;transition:opacity .4s}
#drop-screen.hidden{opacity:0;pointer-events:none}
#drop-zone{width:420px;max-width:88vw;height:220px;border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;cursor:pointer;position:relative;transition:border-color .2s,background .2s}
#drop-zone:hover,#drop-zone.over{border-color:var(--gold-dim);background:var(--gold-faint)}
#drop-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer}
#drop-icon{width:38px;height:38px;opacity:.22}
#drop-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;color:var(--text-dim);text-transform:uppercase;text-align:center;line-height:2}
#drop-hint{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.15em;color:var(--text-dim);opacity:.45}
#load-bar-wrap{width:420px;max-width:88vw;height:1px;background:var(--border);display:none}
#load-bar{height:100%;width:0;background:var(--gold);transition:width .25s ease}
#load-status{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;color:var(--text-dim);display:none}
#drop-shelf-link{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;color:var(--text-dim);text-decoration:none;text-transform:uppercase;opacity:.5;transition:opacity .2s}
#drop-shelf-link:hover{opacity:1;color:var(--gold)}

/* ── Reader ── */
#reader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .5s}
#reader.visible{opacity:1;pointer-events:all}
#topbar{position:absolute;top:0;left:0;right:0;padding:13px 20px;display:flex;justify-content:space-between;align-items:center;z-index:10}
#logo{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase}
#top-right{display:flex;gap:8px;align-items:center}
#book-title{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:.06em;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Track ── */
#track{position:relative;width:640px;max-width:86vw;height:520px;overflow:hidden;flex-shrink:0}
#track::before,#track::after{content:'';position:absolute;left:0;right:0;height:160px;pointer-events:none;z-index:8}
#track::before{top:0;background:linear-gradient(to bottom,var(--bg) 20%,transparent 100%)}
#track::after{bottom:0;background:linear-gradient(to top,var(--bg) 20%,transparent 100%)}
.fl{position:absolute;left:-18px;right:-18px;top:50%;transform:translateY(-50%);height:1px;pointer-events:none;z-index:10}
.fl::before,.fl::after{content:'';position:absolute;top:0;width:12px;height:1px;background:var(--gold);opacity:.35}
.fl::before{left:0}.fl::after{right:0}
.snt{position:absolute;width:100%;text-align:center;font-family:'Lora',serif;line-height:1.7;padding:0 12px;color:var(--text);top:50%;
  transition:transform .46s cubic-bezier(.16,1,.3,1),opacity .46s cubic-bezier(.16,1,.3,1),filter .46s cubic-bezier(.16,1,.3,1);
  will-change:transform,opacity,filter}
/* Chinese sentences use Noto Serif SC for proper CJK rendering */
.snt.zh{font-family:'Noto Serif SC','Lora',serif;line-height:1.85}
.snt b{font-weight:600;font-style:inherit}
.snt .w{display:inline;border-bottom:1px solid transparent;transition:border-color .15s,color .15s;cursor:default}
.dict-on .snt.focused .w:hover{color:var(--gold);border-bottom-color:var(--gold-dim)}

/* ── Bottom bar ── */
#bottombar{position:absolute;bottom:0;left:0;right:0;padding:13px 20px;display:flex;justify-content:space-between;align-items:center;z-index:10}
#wpm-zone{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:9px;color:var(--text-dim)}
.wpm-arrow{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;color:var(--text-mid);background:none;border:1px solid var(--border);padding:5px 9px;cursor:pointer;text-transform:uppercase;transition:color .15s,border-color .15s;user-select:none}
.wpm-arrow:hover{color:var(--gold);border-color:var(--gold-dim)}
#wpm-display{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-mid);min-width:46px;text-align:center;letter-spacing:.06em}
#wpm-label{font-size:9px;color:var(--text-dim);letter-spacing:.12em}
#center-btns{display:flex;gap:8px}
#pos-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:.08em}

/* ── Progress ring ── */
#ring-wrap{position:absolute;right:20px;top:50%;transform:translateY(-50%)}
#ring{transform:rotate(-90deg)}
#ring-bg{fill:none;stroke:var(--border);stroke-width:1.5}
#ring-fill{fill:none;stroke:var(--gold);stroke-width:1.5;stroke-linecap:round;transition:stroke-dashoffset .5s ease}
#play-dot{position:absolute;right:44px;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:var(--gold);opacity:0;transition:opacity .3s}
#play-dot.on{opacity:1;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

/* ── Dictionary tooltip ── */
#dict-tooltip{position:fixed;max-width:280px;min-width:160px;background:var(--surface);border:1px solid var(--border);padding:12px 14px;z-index:200;pointer-events:none;opacity:0;transition:opacity .18s,transform .18s;transform:translateY(-6px)}
#dict-tooltip.show{opacity:1;transform:translateY(0)}
#dict-word{font-family:'Lora',serif;font-size:13px;font-weight:500;color:var(--gold);margin-bottom:4px}
#dict-pos{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px}
#dict-def{font-family:'Lora',serif;font-size:12px;line-height:1.6;color:var(--text-mid)}
#dict-loading{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:.1em}
</style>
</head>
<body>
<div id="app">
  <div id="prog"></div>
  <div id="scan"></div>

  <!-- Drop screen -->
  <div id="drop-screen">
    <div id="drop-zone">
      <input type="file" id="file-input" accept=".pdf,.txt">
      <svg id="drop-icon" viewBox="0 0 40 40" fill="none">
        <rect x="5" y="3" width="22" height="30" rx="2" stroke="#c8a96e" stroke-width="1.2"/>
        <path d="M21 3v9h6" stroke="#c8a96e" stroke-width="1.2"/>
        <path d="M27 24v10M23 30l4 4 4-4" stroke="#c8a96e" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <div id="drop-label">drop a PDF or TXT here<br>or click to browse</div>
      <div id="drop-hint">.pdf · .txt · english & chinese</div>
    </div>
    <div id="load-bar-wrap"><div id="load-bar"></div></div>
    <div id="load-status"></div>
    <a href="bookshelf.html" id="drop-shelf-link">← bookshelf</a>
  </div>

  <!-- Reader -->
  <div id="reader">
    <div id="topbar">
      <span id="logo">focus reader</span>
      <div id="top-right">
        <span id="book-title"></span>
        <button class="btn" id="btn-dict">dict</button>
        <button class="btn" id="btn-bionic">bionic</button>
        <button class="btn" id="btn-shelf" onclick="window.location.href='bookshelf.html'">bookshelf</button>
        <button class="btn" id="btn-new">new book</button>
      </div>
    </div>

    <div id="track"><div class="fl"></div></div>
    <div id="play-dot"></div>
    <div id="ring-wrap">
      <svg id="ring" width="36" height="36" viewBox="0 0 36 36">
        <circle id="ring-bg" cx="18" cy="18" r="15"/>
        <circle id="ring-fill" cx="18" cy="18" r="15" stroke-dasharray="94.25" stroke-dashoffset="94.25"/>
      </svg>
    </div>

    <div id="bottombar">
      <div id="wpm-zone">
        <button class="wpm-arrow" id="btn-wpm-down">− wpm</button>
        <span id="wpm-display">200</span>
        <span id="wpm-label">wpm</span>
        <button class="wpm-arrow" id="btn-wpm-up">+ wpm</button>
      </div>
      <div id="center-btns">
        <button class="btn" id="btn-back">← prev</button>
        <button class="btn" id="btn-play">▶ auto</button>
        <button class="btn" id="btn-fwd">next →</button>
      </div>
      <span id="pos-label">— / —</span>
    </div>
  </div>

  <div id="dict-tooltip">
    <div id="dict-word"></div>
    <div id="dict-pos"></div>
    <div id="dict-def"></div>
    <div id="dict-loading"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
'use strict';
if (typeof pdfjsLib !== 'undefined')
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ── Language detection ───────────────────────────────────────────────────── */
function isChinese(text) {
  // Returns true if >15% of characters are CJK
  const cjk = (text.match(/[\u4e00-\u9fff\u3400-\u4dbf]/g) || []).length;
  return cjk / text.length > 0.15;
}

/* ── Sentence splitting — bilingual ──────────────────────────────────────── */
function splitSentences(rawText) {
  const zh = isChinese(rawText);
  let text = rawText
    .replace(/(\w)-\s*\n\s*(\w)/g, '$1$2')  // dehyphenate
    .replace(/\s+/g, ' ').trim();

  if (zh) {
    // Chinese: split on full-width sentence-ending punctuation
    // Keep the punctuation attached to the preceding sentence
    text = text.replace(/([。！？…]+)/g, '$1\n');
  } else {
    // English: split on . ! ? followed by space + capital
    text = text.replace(/([.!?…])\s+([A-Z"'])/g, '$1\n$2');
  }

  return text.split('\n')
    .map(s => s.trim())
    .filter(s => s.length > (zh ? 4 : 10) && /[\u4e00-\u9fffA-Za-z]/.test(s));
}

/* ── Bionic reading ───────────────────────────────────────────────────────── */
function toBionic(text) {
  // Only applies to Latin words; Chinese characters don't benefit
  return text.replace(/([A-Za-z\u00C0-\u024F]+)/g, w => {
    if (w.length <= 2) return w;
    const c = Math.max(1, Math.ceil(w.length * 0.42));
    return `<b>${w.slice(0,c)}</b>${w.slice(c)}`;
  });
}

function toWordSpans(text) {
  return text.replace(/(\w[\w''-]*)/g, '<span class="w">$1</span>');
}

/* ── Audio ────────────────────────────────────────────────────────────────── */
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playTick(type) {
  try {
    const ctx=getAudio(), now=ctx.currentTime, sr=ctx.sampleRate;
    const len=Math.floor(sr*.04), buf=ctx.createBuffer(1,len,sr), d=buf.getChannelData(0);
    for(let i=0;i<len;i++){const t=i/sr;d[i]=(Math.random()*2-1)*Math.exp(-t*350)*(type==='limit'?.06:.2);}
    const src=ctx.createBufferSource(); src.buffer=buf;
    const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=2000;
    const g=ctx.createGain(); g.gain.value=type==='auto'?.10:.16;
    src.connect(hp); hp.connect(g); g.connect(ctx.destination); src.start(now);
    const b2=ctx.createBuffer(1,Math.floor(sr*.018),sr), d2=b2.getChannelData(0);
    for(let i=0;i<d2.length;i++) d2[i]=(Math.random()*2-1)*Math.exp(-i/sr*600)*.06;
    const s2=ctx.createBufferSource(); s2.buffer=b2;
    const g2=ctx.createGain(); g2.gain.value=.07;
    s2.connect(g2); g2.connect(ctx.destination); s2.start(now+.015);
  } catch(e){}
}

/* ── State ────────────────────────────────────────────────────────────────── */
let sentences=[], current=0, bionicOn=false, dictOn=false;
let autoOn=false, autoTimer=null, wpm=200, lastNav=0, wheelAcc=0, nodes=[];
let currentBookId=null, isChineseBook=false;

/* ── DOM refs ─────────────────────────────────────────────────────────────── */
const dropScreen  = document.getElementById('drop-screen');
const dropZone    = document.getElementById('drop-zone');
const fileInput   = document.getElementById('file-input');
const loadBarWrap = document.getElementById('load-bar-wrap');
const loadBar     = document.getElementById('load-bar');
const loadStatus  = document.getElementById('load-status');
const readerEl    = document.getElementById('reader');
const trackEl     = document.getElementById('track');
const progBar     = document.getElementById('prog');
const posLabel    = document.getElementById('pos-label');
const ringFill    = document.getElementById('ring-fill');
const playDot     = document.getElementById('play-dot');
const wpmDisplay  = document.getElementById('wpm-display');
const btnPlay     = document.getElementById('btn-play');
const btnBionic   = document.getElementById('btn-bionic');
const btnDict     = document.getElementById('btn-dict');
const bookTitle   = document.getElementById('book-title');
const tooltip     = document.getElementById('dict-tooltip');
const tooltipWord = document.getElementById('dict-word');
const tooltipPos  = document.getElementById('dict-pos');
const tooltipDef  = document.getElementById('dict-def');
const tooltipLoad = document.getElementById('dict-loading');
const appEl       = document.getElementById('app');
const RING_CIRC   = 94.25;
const WPM_STEP=10, WPM_MIN=60, WPM_MAX=500;
const GAP_PX=113;

/* ── WPM ──────────────────────────────────────────────────────────────────── */
function setWPM(val) {
  wpm = Math.max(WPM_MIN, Math.min(WPM_MAX, Math.round(val/WPM_STEP)*WPM_STEP));
  wpmDisplay.textContent = wpm;
  if (autoOn) scheduleAuto();
}

/* ── Layout ───────────────────────────────────────────────────────────────── */
const VSTEPS = [
  {op:1,    blur:0,   scale:1,    size:'21px'},
  {op:0.12, blur:0.6, scale:0.95, size:'16px'},
  {op:0,    blur:2.5, scale:0.92, size:'14px'},
  {op:0,    blur:4,   scale:0.90, size:'13px'},
];

function layout(animated) {
  if (!animated) nodes.forEach(el => { el.style.transition='none'; });
  const focusEl = nodes[current];
  const focusH  = focusEl ? (focusEl.getBoundingClientRect().height || focusEl.offsetHeight || 48) : 48;
  const dy1 = Math.round(focusH/2) + GAP_PX;
  const DY  = [0, dy1, dy1+70, dy1+130];

  nodes.forEach((el,i) => {
    const off=i-current, step=Math.min(Math.abs(off),VSTEPS.length-1);
    const s=VSTEPS[step], sign=off===0?1:Math.sign(off);
    el.style.transform=`translateY(calc(-50% + ${sign*DY[step]}px)) scale(${s.scale})`;
    el.style.opacity=s.op;
    el.style.filter=s.blur?`blur(${s.blur}px)`:'none';
    el.style.fontSize=s.size;
    el.style.zIndex=step===0?5:1;
  });
  if (!animated) requestAnimationFrame(()=>requestAnimationFrame(()=>{ nodes.forEach(el=>{el.style.transition='';}); }));
}

/* ── Nodes ────────────────────────────────────────────────────────────────── */
function buildNodes() {
  nodes.forEach(n=>n.remove()); nodes=[];
  sentences.forEach(()=>{
    const el=document.createElement('div');
    el.className='snt' + (isChineseBook ? ' zh' : '');
    el.style.top='50%';
    trackEl.appendChild(el); nodes.push(el);
  });
  renderNodeText();
}

function renderNodeText() {
  nodes.forEach((el,i) => {
    const raw=sentences[i], isFocused=i===current;
    if (bionicOn)                  el.innerHTML=toBionic(raw);
    else if (dictOn && isFocused)  el.innerHTML=toWordSpans(raw);
    else                           el.textContent=raw;
    el.classList.toggle('focused', isFocused);
  });
}

/* ── HUD ──────────────────────────────────────────────────────────────────── */
function updateHUD() {
  const pct=sentences.length>1?current/(sentences.length-1):0;
  progBar.style.width=(pct*100)+'%';
  posLabel.textContent=String(current+1).padStart(2,'0')+' / '+String(sentences.length).padStart(2,'0');
  ringFill.style.strokeDashoffset=RING_CIRC-(RING_CIRC*pct);
  // Save reading position to bookshelf entry
  if (currentBookId) saveProgress();
}

/* ── Bookshelf persistence ────────────────────────────────────────────────── */
function loadShelf() {
  try { return JSON.parse(localStorage.getItem('focusreader_shelf') || '[]'); } catch(e) { return []; }
}
function saveShelf(shelf) {
  localStorage.setItem('focusreader_shelf', JSON.stringify(shelf));
}
function saveProgress() {
  const shelf = loadShelf();
  const idx = shelf.findIndex(b => b.id === currentBookId);
  if (idx !== -1) {
    shelf[idx].progress = current;
    shelf[idx].total    = sentences.length;
    saveShelf(shelf);
  }
}
function saveBookToShelf(name, sentencesArr, zh) {
  const shelf = loadShelf();
  const id    = 'book_' + Date.now();
  shelf.push({
    id, title: name, originalName: name,
    sentences: sentencesArr,
    progress: 0, total: sentencesArr.length,
    lang: zh ? 'zh' : 'en',
    added: new Date().toISOString()
  });
  saveShelf(shelf);
  return id;
}

/* ── Auto-advance ─────────────────────────────────────────────────────────── */
/*
  Chinese reading speed fix:
  Chinese has no spaces — split(/\s+/) always returns 1 "word" per sentence,
  hitting the minimum floor and making auto far too fast.

  Research: native Chinese readers read 300–700 characters/min at leisure (~400 avg).
  Fix: count CJK characters directly. The wpm slider maps to cpm for Chinese
  (wpm 200 → 400 cpm, a 2× ratio since 1 Chinese char ≈ 2 English syllables of info).
*/
function sentenceDelay(idx) {
  const text = sentences[idx].trim();
  let units, rate;
  if (isChineseBook) {
    units = (text.match(/[\u4e00-\u9fff\u3400-\u4dbf\uff00-\uffef]/g) || []).length || text.length;
    rate  = wpm * 2; // slider at 200 → 400 cpm
  } else {
    units = text.split(/\s+/).length;
    rate  = wpm;
  }
  return Math.max(1000, Math.round((units / rate) * 60000) + 400);
}
function scheduleAuto() { clearTimeout(autoTimer); if(!autoOn) return; autoTimer=setTimeout(()=>navigate(1,'auto'),sentenceDelay(current)); }
function startAuto() { autoOn=true; btnPlay.classList.add('active'); btnPlay.textContent='⏸ pause'; playDot.classList.add('on'); scheduleAuto(); }
function stopAuto()  { autoOn=false; clearTimeout(autoTimer); btnPlay.classList.remove('active'); btnPlay.textContent='▶ auto'; playDot.classList.remove('on'); }
function toggleAuto(){ autoOn?stopAuto():startAuto(); }

/* ── Navigate ─────────────────────────────────────────────────────────────── */
function navigate(dir, source) {
  const now=Date.now();
  if (source!=='auto' && now-lastNav<120) return;
  lastNav=now;
  const next=current+dir;
  if (next<0||next>=sentences.length) { playTick('limit'); if(autoOn&&next>=sentences.length)stopAuto(); return; }
  playTick(source==='auto'?'auto':'manual');
  current=next; hideTooltip(); renderNodeText();
  requestAnimationFrame(()=>layout(true));
  updateHUD(); scheduleAuto();
}

/* ── Dictionary ───────────────────────────────────────────────────────────── */
const dictCache={};
let tooltipHideTimer=null;

function showTooltip(word, anchorEl) {
  clearTimeout(tooltipHideTimer);
  const clean=word.replace(/[^a-zA-Z'-]/g,'').toLowerCase();
  if (!clean||clean.length<2) return;
  const rect=anchorEl.getBoundingClientRect();
  const tx=Math.min(rect.left+rect.width/2-140, window.innerWidth-296);
  tooltip.style.left=Math.max(8,tx)+'px';
  tooltip.style.top=rect.top+'px';
  tooltip.style.transform='translateY(-110%)';
  tooltipWord.textContent=clean; tooltipPos.textContent=''; tooltipDef.textContent=''; tooltipLoad.textContent='looking up…';
  tooltip.classList.add('show');
  if (dictCache[clean]) { renderDefinition(dictCache[clean]); return; }
  fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(clean)}`)
    .then(r=>r.json())
    .then(data=>{
      if (!Array.isArray(data)||!data[0]) { dictCache[clean]=null; renderDefinition(null); return; }
      const m=data[0].meanings?.[0], result={word:data[0].word,pos:m?.partOfSpeech||'',def:m?.definitions?.[0]?.definition||''};
      dictCache[clean]=result; renderDefinition(result);
    }).catch(()=>renderDefinition(null));
}
function renderDefinition(r) {
  tooltipLoad.textContent='';
  if (!r||!r.def) { tooltipPos.textContent=''; tooltipDef.textContent='no definition found'; return; }
  tooltipPos.textContent=r.pos; tooltipDef.textContent=r.def;
}
function hideTooltip() { tooltip.classList.remove('show'); }

trackEl.addEventListener('mouseover', e => { if(!dictOn) return; const sp=e.target.closest('.w'); if(sp) showTooltip(sp.textContent,sp); });
trackEl.addEventListener('mouseout',  e => { if(!e.relatedTarget||!e.relatedTarget.closest('.w')) tooltipHideTimer=setTimeout(hideTooltip,120); });

/* ── PDF extraction ───────────────────────────────────────────────────────── */
function setStatus(msg){ loadStatus.style.display='block'; loadStatus.textContent=msg; }
function setProgress(p){ loadBar.style.width=(p*100)+'%'; }

async function extractPDFText(file) {
  const arrayBuf=await file.arrayBuffer();
  setProgress(0.15); setStatus('parsing pages…');
  const pdf=await pdfjsLib.getDocument({data:arrayBuf}).promise;
  const total=pdf.numPages; let fullText='';
  for (let p=1;p<=total;p++) {
    const page=await pdf.getPage(p);
    const content=await page.getTextContent();
    let lastY=null, pageText='';
    for (const item of content.items) {
      if (!('str' in item)) continue;
      if (lastY!==null&&Math.abs(item.transform[5]-lastY)>12) pageText+=' ';
      pageText+=item.str; lastY=item.transform[5];
    }
    fullText+=pageText+' ';
    setProgress(0.15+0.75*(p/total)); setStatus(`page ${p} of ${total}…`);
  }
  return fullText;
}

async function handleFile(file) {
  if (!file) return;
  const name=file.name.replace(/\.[^.]+$/,'');
  bookTitle.textContent=name;
  loadBarWrap.style.display='block'; setProgress(0.05); setStatus('reading file…');
  try {
    let rawText='';
    if (file.name.toLowerCase().endsWith('.pdf')) {
      if (typeof pdfjsLib==='undefined'){setStatus('PDF.js failed to load.');return;}
      rawText=await extractPDFText(file);
    } else { rawText=await file.text(); setProgress(1); }
    setStatus('splitting sentences…');
    const zh=isChinese(rawText);
    const parsed=splitSentences(rawText);
    if (parsed.length<2){setStatus('Could not extract readable text.');return;}
    // Save to bookshelf
    const id=saveBookToShelf(name, parsed, zh);
    openBook({id, title:name, sentences:parsed, lang:zh?'zh':'en', progress:0});
  } catch(err){ setStatus('Error: '+err.message); console.error(err); }
}

function openBook(book) {
  sentences     = book.sentences;
  current       = book.progress || 0;
  currentBookId = book.id;
  isChineseBook = book.lang === 'zh';
  bookTitle.textContent = book.title;
  stopAuto(); buildNodes();
  requestAnimationFrame(()=>{ layout(false); updateHUD(); });
  dropScreen.classList.add('hidden');
  setTimeout(()=>{ dropScreen.style.display='none'; readerEl.classList.add('visible'); }, 400);
}

/* ── URL param: open book by id ───────────────────────────────────────────── */
function tryOpenFromURL() {
  const params = new URLSearchParams(window.location.search);
  const id     = params.get('book');
  if (!id) return false;
  const shelf  = loadShelf();
  const book   = shelf.find(b => b.id === id);
  if (!book) return false;
  dropScreen.style.display='none';
  readerEl.classList.add('visible');
  openBook(book);
  return true;
}

/* ── Controls ─────────────────────────────────────────────────────────────── */
dropZone.addEventListener('dragover', e=>{e.preventDefault();dropZone.classList.add('over');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e=>{e.preventDefault();dropZone.classList.remove('over');handleFile(e.dataTransfer.files[0]);});
fileInput.addEventListener('change', e=>handleFile(e.target.files[0]));

btnPlay.addEventListener('click',toggleAuto);
document.getElementById('btn-back').addEventListener('click',()=>{stopAuto();navigate(-1);});
document.getElementById('btn-fwd' ).addEventListener('click',()=>{stopAuto();navigate(1); });
document.getElementById('btn-wpm-down').addEventListener('click',()=>setWPM(wpm-WPM_STEP));
document.getElementById('btn-wpm-up'  ).addEventListener('click',()=>setWPM(wpm+WPM_STEP));
btnBionic.addEventListener('click',()=>{ bionicOn=!bionicOn; btnBionic.classList.toggle('active',bionicOn); renderNodeText(); });
btnDict.addEventListener('click',()=>{ dictOn=!dictOn; btnDict.classList.toggle('active',dictOn); appEl.classList.toggle('dict-on',dictOn); if(!dictOn)hideTooltip(); renderNodeText(); });
document.getElementById('btn-new').addEventListener('click',()=>{
  stopAuto(); readerEl.classList.remove('visible');
  dropScreen.style.display=''; setTimeout(()=>dropScreen.classList.remove('hidden'),20);
  loadBar.style.width='0'; loadStatus.style.display='none'; loadBarWrap.style.display='none'; fileInput.value='';
});

window.addEventListener('wheel', e=>{
  if (!readerEl.classList.contains('visible')) return;
  e.preventDefault(); wheelAcc+=e.deltaY;
  if (Math.abs(wheelAcc)>=25){stopAuto();navigate(wheelAcc>0?1:-1);wheelAcc=0;}
},{passive:false});

let touchY0=0;
window.addEventListener('touchstart',e=>{touchY0=e.touches[0].clientY;},{passive:true});
window.addEventListener('touchend',e=>{
  if (!readerEl.classList.contains('visible')) return;
  const dy=touchY0-e.changedTouches[0].clientY;
  if (Math.abs(dy)>28){stopAuto();navigate(dy>0?1:-1);}
});

window.addEventListener('keydown',e=>{
  if (!readerEl.classList.contains('visible')) return;
  if (e.key===' '||e.key==='Enter'){e.preventDefault();toggleAuto();return;}
  if (e.key==='ArrowRight'){e.preventDefault();setWPM(wpm+WPM_STEP);return;}
  if (e.key==='ArrowLeft') {e.preventDefault();setWPM(wpm-WPM_STEP);return;}
  if (e.key==='ArrowDown') {e.preventDefault();stopAuto();navigate(1); return;}
  if (e.key==='ArrowUp')   {e.preventDefault();stopAuto();navigate(-1);return;}
  if (e.key==='b'||e.key==='B') btnBionic.click();
  if (e.key==='d'||e.key==='D') btnDict.click();
  if (e.key==='Escape'){stopAuto();hideTooltip();}
});

/* ── Init ─────────────────────────────────────────────────────────────────── */
if (!tryOpenFromURL()) {
  // Show drop screen — no demo text, go straight to drop or bookshelf
  dropScreen.style.display='';
  dropScreen.classList.remove('hidden');
}
</script>
